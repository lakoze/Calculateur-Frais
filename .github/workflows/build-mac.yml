name: Build Mac DMG

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate ICNS icon from PNG
        run: |
          mkdir -p icon.iconset
          sips -z 16 16     assets/icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     assets/icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     assets/icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     assets/icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   assets/icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   assets/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   assets/icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   assets/icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   assets/icon.png --out icon.iconset/icon_512x512.png
          iconutil -c icns icon.iconset -o assets/icon.icns

      - name: Build Mac app (sans DMG)
        run: npx electron-builder --mac dir
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Signer correctement chaque binaire Electron
        run: |
          APP=$(find dist -name "*.app" -maxdepth 3 | head -1)
          echo "App trouvée : $APP"
          ENTITLEMENTS="entitlements.plist"

          # 1. Signer les frameworks et dylibs (du plus profond au plus haut)
          find "$APP/Contents/Frameworks" -name "*.dylib" -o -name "*.so" | while read f; do
            codesign --force --sign - "$f" 2>/dev/null || true
          done

          find "$APP/Contents/Frameworks" -name "*.framework" | while read f; do
            codesign --force --deep --sign - "$f" 2>/dev/null || true
          done

          find "$APP/Contents/Frameworks" -name "Electron Helper*" -name "*.app" | while read h; do
            codesign --force --sign - --entitlements "$ENTITLEMENTS" "$h" 2>/dev/null || true
          done

          # 2. Signer le bundle principal
          codesign --force --sign - --entitlements "$ENTITLEMENTS" "$APP"
          echo "Signature terminée"
          codesign --verify --verbose "$APP" || true

      - name: Créer le DMG avec raccourci Applications
        run: |
          APP=$(find dist -name "*.app" -maxdepth 3 | head -1)
          # Dossier de staging pour le DMG
          mkdir -p /tmp/dmg-staging
          cp -r "$APP" /tmp/dmg-staging/
          ln -s /Applications /tmp/dmg-staging/Applications
          hdiutil create \
            -volname "Calculateur de Frais" \
            -srcfolder /tmp/dmg-staging \
            -ov -format UDZO \
            dist/CalculateurFrais-Mac.dmg
          echo "DMG créé"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: CalculateurFrais-Mac
          path: dist/CalculateurFrais-Mac.dmg
          retention-days: 30
